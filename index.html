<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <h1>🌤️ Async Weather Tracker</h1>

    <div class="container">
        <div class="top-section">
            <div class="weatherForm">
                <h3>Search City</h3>
                <form id="form">
                    <input type="text" id="city" autocomplete="off">
                    <button id="search" type="submit">Search</button>
                </form>

                <h3>Search History</h3>
                <div class="historyBtn"></div>
            </div>

            <div class="info">
                <h3>Weather Info</h3>
                <div id="weatherContent"></div>
            </div>
        </div>

        <div class="console">
            <h3>Console - Event Loop</h3>
            <div class="console-box" id="consoleBox"></div>
        </div>
    </div>

    <script src="weather.js"></script>
</body>
</html>
